<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <!-- Bed base -->
  <rect x="6" y="44" width="52" height="12" rx="3" fill="#bdc3c7" stroke="#95a5a6" stroke-width="2"/>
  <!-- Sheet under blanket -->
  <rect x="8" y="28" width="48" height="18" rx="2" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1.5"/>
  <!-- Blanket spread over bed -->
  <path d="M8 38 Q32 30 56 38 L56 56 L8 56 Z" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <!-- Blanket top edge (draped over) -->
  <path d="M8 38 Q32 30 56 38" stroke="#c0392b" stroke-width="2.5" fill="none"/>
  <!-- Blanket texture lines -->
  <path d="M14 42 Q32 36 50 42" stroke="#c0392b" stroke-width="1" stroke-dasharray="3 2" fill="none"/>
  <!-- Arrow indicating spreading down -->
  <path d="M32 10 L32 20" stroke="#3498db" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M28 20 L32 24 L36 20" stroke="#3498db" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Pillow visible at top -->
  <rect x="18" y="18" width="28" height="12" rx="5" fill="#fff" stroke="#bdc3c7" stroke-width="1.5"/>
</svg>
