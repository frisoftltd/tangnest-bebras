<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <!-- Pillow main shape -->
  <rect x="8" y="18" width="48" height="30" rx="12" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2.5"/>
  <!-- Pillow inner border (stitching) -->
  <rect x="14" y="24" width="36" height="18" rx="8" fill="none" stroke="#bdc3c7" stroke-width="1.5" stroke-dasharray="3 2"/>
  <!-- Center indent suggestion -->
  <ellipse cx="32" cy="33" rx="8" ry="5" fill="none" stroke="#bdc3c7" stroke-width="1" opacity="0.5"/>
  <!-- Bed top edge -->
  <rect x="6" y="48" width="52" height="10" rx="3" fill="#bdc3c7" stroke="#95a5a6" stroke-width="2"/>
  <!-- Arrow placing pillow at top -->
  <path d="M32 6 L32 14" stroke="#3498db" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M28 10 L32 6 L36 10" stroke="#3498db" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
