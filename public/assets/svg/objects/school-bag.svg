  <path d="M44 20 Q48 12 44 8 Q40 4 36 8 L36 20" stroke="#F39C12" stroke-width="3" stroke-linecap="round" fill="none"/>
  <!-- Main zipper -->
  <line x1="12" y1="28" x2="52" y2="28" stroke="#F39C12" stroke-width="2" stroke-linecap="round"/>
