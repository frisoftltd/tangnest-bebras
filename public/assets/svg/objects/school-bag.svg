  <!-- Front pocket -->
  <rect x="18" y="36" width="28" height="16" rx="6" fill="#154580" stroke="#0d2d5e" stroke-width="2"/>
  <!-- Pocket zipper -->
  <line x1="18" y1="44" x2="46" y2="44" stroke="#F39C12" stroke-width="2" stroke-linecap="round"/>
  <!-- Shoulder straps -->
