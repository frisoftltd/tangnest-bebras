<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <!-- Traffic light housing -->
  <rect x="18" y="4" width="28" height="52" rx="8" fill="#2c3e50" stroke="#1a252f" stroke-width="2.5"/>
  <!-- Red light OFF -->
  <circle cx="32" cy="18" r="9" fill="#555" stroke="#333" stroke-width="2"/>
  <!-- Amber light OFF -->
  <circle cx="32" cy="32" r="9" fill="#555" stroke="#333" stroke-width="2"/>
  <!-- Green light ON -->
  <circle cx="32" cy="46" r="9" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <circle cx="32" cy="46" r="5" fill="#58d68d" opacity="0.6"/>
  <!-- Glow around green -->
  <circle cx="32" cy="46" r="12" fill="none" stroke="#27ae60" stroke-width="1.5" opacity="0.3"/>
</svg>
