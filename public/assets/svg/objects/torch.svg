  <line x1="22" y1="10" x2="18" y2="4" stroke="#F39C12" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="42" y1="10" x2="46" y2="4" stroke="#F39C12" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
