  <line x1="16" y1="20" x2="14" y2="26" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="20" x2="20" y2="26" stroke="#3498db" stroke-width="2" stroke-linecap="round"/>
  <!-- Person (no umbrella, getting wet) -->
  <circle cx="28" cy="34" r="5" fill="#f5cba7" stroke="#d4956b" stroke-width="1.5"/>
  <path d="M28 39 L28 54" stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
