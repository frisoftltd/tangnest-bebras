  <line x1="24" y1="28" x2="22" y2="34" stroke="#3498db" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="26" x2="28" y2="32" stroke="#3498db" stroke-width="1.5" stroke-linecap="round"/>
  <!-- House nearby -->
  <path d="M42 38 L54 38 L54 58 L42 58 Z" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/>
  <path d="M40 38 L48 26 L56 38 Z" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
