<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240" fill="none">

  <!-- Upper-left region -->
  <path data-region="left"
    d="M 100,22 C 65,18 32,55 35,100 L 100,100 Z"
    fill="#d0d0d0" stroke="#2d6a2d" stroke-width="3" stroke-linejoin="round"
    pointer-events="all" style="cursor:pointer;"/>

  <!-- Upper-right region -->
  <path data-region="right"
    d="M 100,22 L 100,100 L 165,100 C 168,55 135,18 100,22 Z"
    fill="#c0c0c0" stroke="#2d6a2d" stroke-width="3" stroke-linejoin="round"
    pointer-events="all" style="cursor:pointer;"/>

  <!-- Lower region -->
  <path data-region="bottom"
    d="M 35,100 C 35,138 62,160 100,162 C 138,160 165,138 165,100 L 35,100 Z"
    fill="#b0b0b0" stroke="#2d6a2d" stroke-width="3" stroke-linejoin="round"
    pointer-events="all" style="cursor:pointer;"/>

  <!-- Stem -->
  <path data-region="stem"
    d="M 93,162 Q 84,196 87,226 Q 100,230 113,226 Q 116,196 107,162 Z"
    fill="#8B5E3C" stroke="#5d3a1a" stroke-width="2" stroke-linejoin="round"
    pointer-events="all" style="cursor:pointer;"/>

  <!-- Central vein — decorative, not interactive -->
  <line x1="100" y1="22" x2="100" y2="162"
    stroke="#2d6a2d" stroke-width="3.5" stroke-linecap="round" pointer-events="none"/>

  <!-- Horizontal mid-vein — decorative, not interactive -->
  <line x1="35" y1="100" x2="165" y2="100"
    stroke="#2d6a2d" stroke-width="2.5" stroke-linecap="round" pointer-events="none"/>

  <!-- Side veins upper-left — decorative -->
  <path d="M 100,60 Q 72,68 52,78"
    stroke="#2d6a2d" stroke-width="1.8" fill="none" stroke-linecap="round" pointer-events="none"/>

  <!-- Side veins upper-right — decorative -->
  <path d="M 100,60 Q 128,68 148,78"
    stroke="#2d6a2d" stroke-width="1.8" fill="none" stroke-linecap="round" pointer-events="none"/>

  <!-- Side veins lower-left — decorative -->
  <path d="M 100,128 Q 74,138 58,148"
    stroke="#2d6a2d" stroke-width="1.8" fill="none" stroke-linecap="round" pointer-events="none"/>

  <!-- Side veins lower-right — decorative -->
  <path d="M 100,128 Q 126,138 142,148"
    stroke="#2d6a2d" stroke-width="1.8" fill="none" stroke-linecap="round" pointer-events="none"/>

</svg>
