<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none">

  <!-- Upper-left region -->
  <path data-region="left"
    d="M 100,20 C 65,16 32,52 35,100 L 100,100 Z"
    fill="#d0d0d0" stroke="#2d6a2d" stroke-width="3.5" stroke-linejoin="round"
    pointer-events="all" style="cursor:pointer;"/>

  <!-- Upper-right region -->
  <path data-region="right"
    d="M 100,20 L 100,100 L 165,100 C 168,52 135,16 100,20 Z"
    fill="#c0c0c0" stroke="#2d6a2d" stroke-width="3.5" stroke-linejoin="round"
    pointer-events="all" style="cursor:pointer;"/>

  <!-- Lower region -->
  <path data-region="bottom"
    d="M 35,100 C 35,148 62,172 100,174 C 138,172 165,148 165,100 L 35,100 Z"
    fill="#b0b0b0" stroke="#2d6a2d" stroke-width="3.5" stroke-linejoin="round"
    pointer-events="all" style="cursor:pointer;"/>

  <!-- Central vein — decorative only -->
  <line x1="100" y1="20" x2="100" y2="174"
    stroke="#2d6a2d" stroke-width="4" stroke-linecap="round" pointer-events="none"/>

  <!-- Horizontal mid-vein — decorative only -->
  <line x1="35" y1="100" x2="165" y2="100"
    stroke="#2d6a2d" stroke-width="3" stroke-linecap="round" pointer-events="none"/>

  <!-- Side veins upper-left — decorative -->
  <path d="M 100,58 Q 70,68 50,78"
    stroke="#2d6a2d" stroke-width="2" fill="none" stroke-linecap="round" pointer-events="none"/>

  <!-- Side veins upper-right — decorative -->
  <path d="M 100,58 Q 130,68 150,78"
    stroke="#2d6a2d" stroke-width="2" fill="none" stroke-linecap="round" pointer-events="none"/>

  <!-- Side veins lower-left — decorative -->
  <path d="M 100,134 Q 72,148 56,158"
    stroke="#2d6a2d" stroke-width="2" fill="none" stroke-linecap="round" pointer-events="none"/>

  <!-- Side veins lower-right — decorative -->
  <path d="M 100,134 Q 128,148 144,158"
    stroke="#2d6a2d" stroke-width="2" fill="none" stroke-linecap="round" pointer-events="none"/>

</svg>
