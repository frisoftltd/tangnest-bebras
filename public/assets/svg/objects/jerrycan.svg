<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="none">
  <!-- Jerrycan body -->
  <rect x="16" y="20" width="32" height="38" rx="4" fill="#e8f4f8" stroke="#1A56A0" stroke-width="2.5"/>
  <!-- Neck -->
  <rect x="24" y="12" width="16" height="10" rx="3" fill="#1A56A0" stroke="#154580" stroke-width="2"/>
  <!-- Cap -->
  <rect x="27" y="8" width="10" height="6" rx="2" fill="#F39C12" stroke="#d68910" stroke-width="1.5"/>
  <!-- Handle -->
  <path d="M24 22 Q14 22 14 30 Q14 36 24 36" stroke="#1A56A0" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Water level indicator -->
  <path d="M16 44 L48 44" stroke="#1A56A0" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
  <!-- Water fill -->
  <rect x="17" y="45" width="30" height="12" rx="0 0 3 3" fill="rgba(26,86,160,0.15)"/>
</svg>
