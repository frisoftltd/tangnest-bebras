  <rect x="5" y="25" width="20" height="8" rx="4" fill="#1E8449" stroke="#145a32" stroke-width="1.5"/>
  <circle cx="20" cy="29" r="4" fill="#fff" stroke="#145a32" stroke-width="1.5"/>
  <text x="7" y="32" font-size="6" fill="#fff" font-weight="bold">ON</text>
  <!-- Lit bulb (right side) — glowing -->
  <path d="M38 26 Q38 18 46 18 Q54 18 54 26 Q54 32 50 36 L42 36 Q38 32 38 26 Z" fill="#fffacd" stroke="#F39C12" stroke-width="1.5"/>
  <path d="M42 31 Q44 29 46 31 Q48 29 50 31" stroke="#F39C12" stroke-width="1.5" stroke-linecap="round" fill="none"/>
