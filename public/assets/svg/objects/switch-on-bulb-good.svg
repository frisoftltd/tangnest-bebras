  <rect x="43" y="40" width="6" height="3" rx="1" fill="#888" stroke="#555" stroke-width="1"/>
  <!-- Glow rays -->
  <line x1="46" y1="14" x2="46" y2="11" stroke="#F39C12" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="20" x2="33" y2="17" stroke="#F39C12" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="20" x2="59" y2="17" stroke="#F39C12" stroke-width="2" stroke-linecap="round"/>
  <!-- Check mark showing bulb IS ON -->
  <path d="M40 48 L44 53 L54 44" stroke="#27ae60" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
