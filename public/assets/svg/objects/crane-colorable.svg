  <line x1="28" y1="56" x2="26" y2="62" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="36" y1="56" x2="34" y2="62" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M22 62 L26 62 L30 62" stroke="#888" stroke-width="2" stroke-linecap="round"/>
